services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rsvp-web
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=event_confirmation_list;Username=postgres;Password=postgres
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: rsvp-db
    environment:
      POSTGRES_DB: event_confirmation_list
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d event_confirmation_list"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
